# Root railway.toml — points Railway to the server nixpacks config
# Build context is always the monorepo root.
# All paths in nixpacks.toml are relative to monorepo root.
[build]
builder = "NIXPACKS"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
startCommand = "cd server && npx prisma db push --accept-data-loss && npx prisma db seed && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
