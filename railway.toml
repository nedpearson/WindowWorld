# Root railway.toml — single source of truth for Railway deployment.
# Build context is the monorepo root.
[build]
builder = "NIXPACKS"
nixpacksConfigPath = "nixpacks.toml"

[deploy]
# Start: apply only PENDING migrations (safe, idempotent, no data loss),
# then boot Express (which serves the pre-built SPA from spa_build/).
# IMPORTANT: prisma db push --accept-data-loss, purge-org-real.ts, and
# prisma db seed have been REMOVED — they caused data loss on every deploy.
startCommand = "cd server && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
