  <!-- Robust fallback for stale PWA chunks: automatically clear SW and reload if chunks fail to fetch -->

    window.addEventListener('error', function (e) {

        if (sessionStorage.getItem('ww_reloading')) {
          console.error('[PWA] Recovery loop detected. Stopping.');
          return;
        }
        sessionStorage.setItem('ww_reloading', 'true');

        if ('serviceWorker' in navigator && caches) {
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              return Promise.all(registrations.map(function (r) { return r.unregister(); }));
            }),
            caches.keys().then(function (names) {
              return Promise.all(names.map(function (name) { return caches.delete(name); }));
            })
          ]).then(function () {
            window.location.href = window.location.pathname + '?nocache=' + Date.now();
          }).catch(function () {
            window.location.reload();
          });
        } else {
          window.location.reload();
        }
      }
    }, true);

    // Clear flag on successful load
    window.addEventListener('load', function () {
      sessionStorage.removeItem('ww_reloading');
    });
