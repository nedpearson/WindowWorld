[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Install server deps, then install web app deps
cmds = [
  "npm install",
  "cd ../apps/web && npm install"
]

[phases.build]
# 1. Generate Prisma client
# 2. Compile TypeScript server
# 3. Build the React frontend
cmds = [
  "prisma generate",
  "npx tsc -p tsconfig.json",
  "cd ../apps/web && npm run build",
  "cp -r ../apps/web/dist ./public"
]

[start]
cmd = "prisma db push --accept-data-loss && node dist/index.js"
