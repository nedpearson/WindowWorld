[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Single npm install at monorepo root installs all workspace packages
cmds = [
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # 1. Generate Prisma client (schema lives in server/prisma/)
  "cd server && npx prisma generate",
  # 2. Compile TypeScript server to server/dist/
  "cd server && npx tsc -p tsconfig.json",
  # 3. Build the React frontend to apps/web/dist/
  "cd apps/web && npm run build",
  # 4. Copy built SPA into server/public/ so Express serves it
  "mkdir -p server/public && cp -r apps/web/dist/. server/public/"
]

[start]
cmd = "cd server && npx prisma db push --accept-data-loss && node dist/index.js"
