[phases.setup]
# Node 22 LTS -- required by Prisma and node dist/index.js
nixPkgs = ["nodejs_22"]

[phases.install]
# Single npm install at monorepo root installs all workspace packages
cmds = [
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # npm run build = 'prisma generate && tsc' using the local TypeScript binary.
  # Do NOT use 'npx tsc' — npx installs a wrong 'tsc@2.0.4' package instead
  # of the TypeScript compiler bundled in node_modules/.bin/tsc.
  "cd server && npm run build",
  # Build Vite frontend → apps/web/dist/
  "cd apps/web && npm run build"
]

[start]
# Apply schema, run idempotent seed, start server
cmd = "cd server && npx prisma db push --accept-data-loss && npx prisma db seed && node dist/index.js"
