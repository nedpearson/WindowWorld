[phases.setup]
# Node 22 LTS -- required by Prisma and node dist/index.js
nixPkgs = ["nodejs_22"]

[phases.install]
# Single npm install at monorepo root installs all workspace packages
cmds = [
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # 1. Generate Prisma client (OS-specific native binaries -- must run at deploy time)
  "cd server && npx prisma generate",
  # 2. Compile server TypeScript → server/dist/
  "cd server && npx tsc",
  # 3. Build Vite frontend → server/public/
  "cd apps/web && npm run build"
]

[start]
# Apply schema, run idempotent seed, start server
cmd = "cd server && npx prisma db push --accept-data-loss && npx prisma db seed && node dist/index.js"
