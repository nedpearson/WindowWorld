name: WindowWorld CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/windowworld_test?schema=public"
      JWT_SECRET: "ci-test-jwt-secret-minimum-32-chars-ok"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: windowworld_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm install --legacy-peer-deps

    - name: Validate & Generate Prisma Client
      working-directory: ./server
      run: |
        npx prisma validate
        npx prisma generate

    - name: Push Database Schema
      working-directory: ./server
      run: npx prisma db push

    - name: Seed Database
      working-directory: ./server
      run: npm run seed

    - name: Run Monorepo Linter
      run: npm run lint

    - name: Typecheck Frontend
      working-directory: ./apps/web
      run: npm run typecheck

    - name: Typecheck Backend
      working-directory: ./server
      run: npm run typecheck

    - name: Run Server Unit Tests
      working-directory: ./server
      run: npm test
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/windowworld_test?schema=public"
        JWT_SECRET: "ci-test-jwt-secret-minimum-32-chars-ok"
        NODE_ENV: "test"

    - name: Build Backend
      working-directory: ./server
      run: npm run build

    - name: Build Frontend
      working-directory: ./apps/web
      run: npm run build
