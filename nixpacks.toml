providers = ["node"]

[phases.setup]
# Node 22 LTS — required by Prisma and node dist/index.js
nixPkgs = ["nodejs_22"]

[phases.install]
# Single npm install at monorepo root installs all workspace packages
cmds = [
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # Build TypeScript server (prisma generate && tsc) — uses local binary
  "cd server && npm run build",
  # The pre-built Vite frontend is committed at apps/web/dist/.
  # Copy it into server/spa_build/ so Express can find it regardless of cwd.
  "mkdir -p server/spa_build && cp -r apps/web/dist/. server/spa_build/",
  # Verification — fail the build if the SPA index is missing
  "test -f server/spa_build/index.html && echo '[BUILD] SPA verified at server/spa_build/index.html' || (echo '[BUILD] FATAL: SPA index.html missing!' && exit 1)"
]

[start]
# Apply schema, run idempotent seed, start server
cmd = "cd server && npx prisma db push --accept-data-loss && npx tsx prisma/purge-org-real.ts && npx prisma db seed && npx tsx prisma/seed-advanced-catalog.ts && node dist/index.js"
