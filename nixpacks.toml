providers = ["node"]

[phases.setup]
# Node 22 LTS — required by Prisma and node dist/index.js
nixPkgs = ["nodejs_22"]

[phases.install]
# Single npm install at monorepo root installs all workspace packages
cmds = [
  "npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  # Build frontend SPA
  "cd apps/web && npm run build",
  # Build TypeScript server (prisma generate && tsc)
  "cd server && npm run build",
  # Copy built SPA to server for unified serving
  "mkdir -p server/spa_build && cp -r apps/web/dist/. server/spa_build/",
  # Verification — fail the build if the SPA index is missing
  "test -f server/spa_build/index.html && echo '[BUILD] SPA verified at server/spa_build/index.html' || (echo '[BUILD] FATAL: SPA index.html missing!' && exit 1)"
]

[start]
# Apply safe migrations and start server (no destructive db push or seed allowed on production runtime)
cmd = "cd server && npx prisma migrate deploy && node dist/index.js"
